# Gitee Go CI 配置 - Android 自动编译
# 每次 push 代码自动编译 Debug APK

stages:
  - build

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
  ANDROID_COMPILE_SDK: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_SDK_TOOLS: "11076708"

before_script:
  # 设置 JDK 17
  - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
  - export PATH=$JAVA_HOME/bin:$PATH
  - java -version
  
  # 下载 Android SDK
  - mkdir -p /opt/android-sdk
  - cd /opt/android-sdk
  - wget -q https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip
  - unzip -q commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip
  - mkdir -p cmdline-tools/latest
  - mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
  - export ANDROID_HOME=/opt/android-sdk
  - export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
  
  # 安装 SDK 组件
  - yes | sdkmanager --licenses || true
  - sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}"

build_apk:
  stage: build
  image: openjdk:17-jdk
  script:
    - cd $CI_PROJECT_DIR
    - chmod +x ./gradlew
    - ./gradlew assembleDebug --no-daemon --stacktrace
  artifacts:
    name: "ADB_Audio_Transfer_$CI_COMMIT_SHA"
    paths:
      - app/build/outputs/apk/debug/*.apk
    expire_in: 30 days
  only:
    - master
    - main
